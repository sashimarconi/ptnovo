<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagamento confirmado — TikTok Rewards</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#fafafa 0%,#fff5f7 100%);color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:440px;background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.05);padding:40px 28px;text-align:center}
  .icon{width:72px;height:72px;border-radius:50%;background:#e8f8ee;color:#16a34a;font-size:36px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  h1{font-size:22px;font-weight:900;margin:0 0 8px}
  p{color:#555;font-size:14px;line-height:1.5;margin:0 0 18px}
  .id{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px;color:#888;word-break:break-all;display:none}
  .id.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Pagamento confirmado!</h1>
  <p>Recebemos a sua confirmação. O seu saldo será creditado e o reembolso da taxa ocorrerá entre 1 e 5 minutos.</p>
  <div class="id" id="ref"></div>
</div>
<script>
  const id = new URLSearchParams(location.search).get('id');
  if (id) {
    const el = document.getElementById('ref');
    el.textContent = 'Ref.: ' + id;
    el.classList.add('show');
  }
</script>
</body>
</html>
